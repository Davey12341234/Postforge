#cloud-config
# Filled by: scripts/prepare-autoinstall-seed.ps1 -> writes "user-data" (no extension)
# Kernel cmdline must include: autoinstall ds=nocloud-net;s=CHANGEME_SEED_BASE/
autoinstall:
  version: 1
  locale: en_US
  keyboard:
    layout: us
  network:
    network:
      version: 2
      ethernets:
        any:
          match:
            name: en*
          dhcp4: true
  storage:
    layout:
      name: CHANGEME_STORAGE_LAYOUT
  identity:
    hostname: CHANGEME_HOST
    username: CHANGEME_USER
    password: "CHANGEME_PASSWORD_HASH"
  ssh:
    install-server: true
    allow-pw: true
  packages:
    - curl
    - wget
  user-data:
    runcmd:
      - "sleep 15"
      - wget -qO /root/bootstrap.sh CHANGEME_SEED_BASE/bootstrap.sh
      - wget -qO /root/bring-online.sh CHANGEME_SEED_BASE/bring-online.sh
      - wget -qO /root/babygpt.service CHANGEME_SEED_BASE/babygpt.service
      - wget -qO /root/babygpt-src.zip CHANGEME_SEED_BASE/babygpt-src.zip
      - chmod +x /root/bootstrap.sh /root/bring-online.sh
      - /bin/bash /root/bring-online.sh /root/babygpt-src.zip
